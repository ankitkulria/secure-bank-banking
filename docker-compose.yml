services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: ankit25
      MYSQL_DATABASE: banking_management

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    image: banking-backend
    container_name: banking-backend-container

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/banking_management?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ankit25

    depends_on:
      - mysql

  frontend:
    image: banking-frontend
    container_name: banking-frontend-container

    ports:
      - "80:80"

    depends_on:
      - backend

volumes:
  mysql-data: